input {
    kb_layout = pl,ru
    kb_options = grp:win_space_toggle
    repeat_delay = 250
    repeat_rate = 40

    follow_mouse = 1
    mouse_refocus = false

    touchpad {
        natural_scroll = true
    }

    sensitivity = -0.5
    accel_profile = flat
}

cursor {
    no_warps = true
}

general {
    border_size = 1
    col.active_border = rgb(b7bdf8)
    gaps_in = 3
    gaps_out = 6
    layout = master
}

decoration {
    rounding = 8
    blur {
        enabled = false
        size = 3
        passes = 1
    }
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

render {
    direct_scanout = 1
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    orientation = left
    mfact = 0.50
}

gesture = 3, horizontal, workspace

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 2
}

windowrule = match:class ^(brave-browser)$, workspace 1
windowrule = match:class ^(Alacritty)$, workspace 2
windowrule = match:class ^(org\.telegram\.desktop)$, workspace 3
windowrule = match:class ^(steam)$, workspace 4
windowrule = match:class ^(steam_app_\d+)$, workspace 5
windowrule = match:class ^(gnome-pomodoro)$, workspace special
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on, center on, size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:initial_title ^(_crx_.*)$, float on, center on, size (monitor_w*0.15) (monitor_h*0.4)
windowrule = match:class ^(gnome-calculator|org\.gnome\.Calculator)$, float on, center on
windowrule = match:title ^(Select what to share)$, float on
windowrule = match:title ^(.*is sharing (your screen|a window)\.)$, float on, pin on, border_size 0, move ((monitor_w-window_w)/2) (monitor_h-window_h)
windowrule = match:class ^(steam_app_\d+)$, fullscreen on

$mainMod = SUPER

bind = $mainMod, Return, layoutmsg, swapwithmaster
bind = $mainMod, R, layoutmsg, orientationcycle
bind = $mainMod, Q, killactive,
bind = CTRL ALT, Q, exit
bind = $mainMod, F, togglefloating
bind = $mainMod, M, fullscreen, 1 toggle
bind = $mainMod SHIFT, M, fullscreen
bind = $mainMod, P, togglespecialworkspace
bind = $mainMod SHIFT, P, movetoworkspacesilent, special
bind = $mainMod, l, movefocus, r
bind = $mainMod, h, movefocus, l
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, j, movewindow, d
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, l, movewindow, r
bind = $mainMod SHIFT, left, resizeactive, -50 0
bind = $mainMod SHIFT, right, resizeactive, 50 0
bind = $mainMod SHIFT, up, resizeactive, 0 -50
bind = $mainMod SHIFT, down, resizeactive, 0 50
bind = CTRL ALT, C, centerwindow
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod SHIFT, Return, exec, alacritty
bind = $mainMod SHIFT, B, exec, brave
bind = $mainMod SHIFT, F, exec, nautilus
bind = $mainMod SHIFT, T, exec, Telegram
bind = CTRL ALT, P, exec, gnome-pomodoro --start-stop
bind = CTRL, Space, exec, noctalia-shell ipc call launcher toggle
bind = ALT SHIFT, V, exec, noctalia-shell ipc call launcher clipboard
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = ALT SHIFT, 2, exec, ocr
bind = $mainMod SHIFT, S, exec, grimblast -f save area - | swappy -f -
bind = $mainMod CTRL, S, exec, grimblast -f save output - | swappy -f -
bind = $mainMod SHIFT, R, exec, toggle-screen-recording
bind = CTRL ALT, L, exec, noctalia-shell ipc call lockScreen lock
bind = $mainMod, C, exec, noctalia-shell ipc call controlCenter toggle
bind = $mainMod, N, exec, noctalia-shell ipc call notifications toggleHistory
bind = $mainMod SHIFT, Backspace, exec, noctalia-shell ipc call notifications clear
bind = , XF86MonBrightnessUp, exec, noctalia-shell ipc call brightness increase
bind = , XF86MonBrightnessDown, exec, noctalia-shell ipc call brightness decrease
bind = , XF86AudioRaiseVolume, exec, noctalia-shell ipc call volume increase
bind = , XF86AudioLowerVolume, exec, noctalia-shell ipc call volume decrease
bind = , XF86AudioMute, exec, noctalia-shell ipc call volume muteOutput
bind = SHIFT, XF86AudioRaiseVolume, exec, noctalia-shell ipc call volume increaseInput
bind = SHIFT, XF86AudioLowerVolume, exec, noctalia-shell ipc call volume decreaseInput
bind = SHIFT, XF86AudioMute, exec, noctalia-shell ipc call volume muteInput
